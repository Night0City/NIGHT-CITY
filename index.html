<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIGHT CITY | نايت ستي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8B00FF; /* بنفسجي نيون */
            --bg: #050505;
            --accent: #00ff88; /* أخضر نيون للحالة */
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 50% 50%, #1a0033 0%, #050505 100%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .main-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 0, 255, 0.3);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(139, 0, 255, 0.1);
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: 5px;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(139, 0, 255, 0.5);
        }

        .time-box {
            font-size: 1.5rem;
            color: #888;
            margin: 15px 0;
            font-family: monospace;
        }

        .about-section {
            margin: 25px 0;
            font-size: 1rem;
            color: #bbb;
            line-height: 1.6;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 0;
        }

        .stats-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(139, 0, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(139, 0, 255, 0.2);
            flex: 1;
            margin: 0 5px;
        }

        .stat-num {
            display: block;
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--primary);
            text-transform: uppercase;
        }

        .btn-join {
            display: block;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 0 25px var(--primary);
            transition: 0.3s ease;
        }

        .btn-join:hover {
            transform: scale(1.03);
            box-shadow: 0 0 40px var(--primary);
            background: #9d26ff;
        }

        footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <header>
            <h1>NIGHT CITY</h1>
            <div class="time-box" id="clock">00:00:00</div>
        </header>

        <div class="about-section">
            نحن سيرفر <strong>نايت ستي رول بلاي</strong>. نقدم تجربة حياة واقعية فريدة، فخامة القيادة، وبناء المجتمع الأفضل.
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <span class="stat-num" id="member-count">--</span>
                <span class="stat-label">عضو متصل</span>
            </div>
            <div class="stat-card">
                <span class="stat-num" style="color: var(--accent);">Active</span>
                <span class="stat-label">حالة السيرفر</span>
            </div>
        </div>

        <a href="https://discord.gg/VzUVxJBGFZ" target="_blank" class="btn-join">دخول السيرفر ⚡</a>

        <footer>DEVELOPED BY HUSSAIN | 2026</footer>
    </div>

    <script>
        // تحديث الساعة بتوقيت البحرين/السعودية
        function updateClock() {
            const now = new Date();
            const options = { timeZone: 'Asia/Riyadh', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // جلب عدد الأعضاء الحقيقي
        async function fetchDiscord() {
            try {
                // آيدي سيرفرك
                const response = await fetch('https://discord.com/api/guilds/1490328240919941232/widget.json');
                const data = await response.json();
                document.getElementById('member-count').innerText = data.presence_count;
            } catch (error) {
                document.getElementById('member-count').innerText = "0";
            }
        }
        fetchDiscord();
        setInterval(fetchDiscord, 30000); // تحديث كل 30 ثانية
    </script>
</body>
</html>
