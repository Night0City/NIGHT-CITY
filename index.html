<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIGHT CITY RP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8B00FF; --bg: #050505; --accent: #00ff88; }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a0033 0%, #050505 100%);
            overflow: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 0, 255, 0.2);
            padding: 60px 40px;
            border-radius: 40px;
            text-align: center;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(139, 0, 255, 0.6));
        }
        .clock { font-size: 2.5rem; margin: 30px 0; font-weight: bold; color: #fff; }
        .join-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 0;
            width: 100%;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 25px rgba(139, 0, 255, 0.4);
            font-family: 'Cairo', sans-serif;
        }
        .join-btn:hover { transform: scale(1.02); background: #9d26ff; }
        #loader { display: none; margin-top: 20px; padding: 15px; border-radius: 15px; border: 1px dashed var(--primary); }
        footer { margin-top: 50px; font-size: 0.7rem; color: #444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NIGHT CITY</h1>
        <div class="clock" id="clock">00:00:00</div>
        <p style="color: #bbb; margin-bottom: 40px;">أفضل تجربة رول بلاي في انتظارك</p>
        <button class="join-btn" onclick="startJoin()" id="btnText">دخول السيرفر ⚡</button>
        <div id="loader"><span id="loadMsg" style="color: var(--accent);">جاري التحقق...</span></div>
        <footer>DEVELOPED BY H? | 2026 / 18 </footer>
    </div>
    <script>
        function updateClock() {
            const now = new Date();
            const options = { timeZone: 'Asia/Riyadh', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        function startJoin() {
            const btn = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const msg = document.getElementById('loadMsg');
            btn.disabled = true;
            btn.style.opacity = "0.5";
            loader.style.display = "block";
            setTimeout(() => { msg.innerText = "تم التحقق ✅"; }, 1000);
            setTimeout(() => { msg.innerText = "جاري التحويل..."; }, 2000);
            setTimeout(() => { window.location.href = "https://discord.gg/VzUVxJBGFZ"; }, 2500);
        }
    </script>
</body>
</html>
